- type: entity
  parent: [Cane, BaseAntiPsionicWeapon, BaseMantisContraband]
  id: MantisMeleeCane
  Name: gnomo
  description: "An amaranth cane crowned with an eidolite crystal. If flipped in the hand, the needle-sharp mnemolith tip serves as a thrusting weapon. A refined accessory, practical for mantes with limited mobility. Deadly when wielded against psionic and otherworldly threats."
  components:
  - type: Item
    sprite: _DEN/Objects/Weapons/Melee/Mantis/mantiscane.rsi
    size: Normal
    shape:
    - 0,0,1,1 # To override the default cane size
  - type: Sprite
    sprite: _DEN/Objects/Weapons/Melee/Mantis/mantiscane.rsi
    layers:
    - state: icon
      map: [ "icon" ]
    - state: icon-raised
      map: [ "icon-raised" ]
      visible: false
  - type: Appearance
  - type: ToggleableVisuals
    replaceMode: true
    spriteLayer: icon-raised
    inhandVisuals:
      left:
      - state: raised-inhand-left
        map: [ "left-raised" ]
      right:
      - state: raised-inhand-right
        map: [ "right-raised" ]
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        icon:
          True: { visible: false }
          False: { visible: true }
        icon-raised:
          True: { visible: true }
          False: { visible: false }
  - type: ItemToggle
    verbToggleOn: item-toggle-raise
    verbToggleOff: item-toggle-lower
    soundActivate:
      path: /Audio/_DEN/Weapons/Melee/rapiermiss.ogg
      params:
        volume: -5
        pitch: 1.1
        variation: 0.05
    soundDeactivate:
      path: /Audio/_DEN/Weapons/Melee/rapiermiss.ogg
      params:
        volume: -5
        pitch: 0.9
        variation: 0.05
  - type: ItemToggleMeleeWeapon
    activatedSoundOnHit:
      path: /Audio/Weapons/bladeslice.ogg
      params:
        variation: 0.250
    activatedSoundOnHitNoDamage:
      path: /Audio/_DEN/Weapons/Melee/rapiermiss.ogg
      params:
        variation: 0.05
        volume: -10
    activatedSoundOnSwing:
      path: /Audio/_DEN/Weapons/Melee/rapiermiss.ogg
      params:
        variation: 0.05
    activatedDamage:
      types:
        Piercing: 15
        Holy: 10
    deactivatedSoundOnHit:
      collection: WeakHit
      params:
        variation: 0.05
    deactivatedSoundOnHitNoDamage:
      collection: WeakHit
      params:
        variation: 0.05
  - type: DamageOtherOnHit
    damage:
      types:
        Piercing: 15
        Holy: 10
