# Mantis projectiles start
# Muzzle flashes
- type: entity
  parent: MuzzleFlashEffect
  id: MuzzleFlashEffectMantisCapgun
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 0.4
  - type: Sprite
    drawdepth: Effects
    offset: 0.1, 0
    layers:
    - sprite: _DEN/Objects/Weapons/Guns/Projectiles/mantis.rsi
      state: muzzle_capgun
      map: ["enum.EffectLayers.Unshaded"]
      shader: unshaded
  - type: PointLight
    enabled: true
    radius: 2
    energy: 3
    color: "#ffb869"

- type: entity
  parent: MuzzleFlashEffect
  id: MuzzleFlashEffectMantisHoly
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 0.4
  - type: Sprite
    drawdepth: Effects
    offset: 0.1, 0
    layers:
    - sprite: _DEN/Objects/Weapons/Guns/Projectiles/mantis.rsi
      state: muzzle_holy
      map: ["enum.EffectLayers.Unshaded"]
      shader: unshaded
  - type: PointLight
    enabled: true
    radius: 2
    energy: 3
    color: "#88b0d0"

- type: entity
  parent: MuzzleFlashEffect
  id: MuzzleFlashEffectMantisLethal
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 0.4
  - type: Sprite
    drawdepth: Effects
    offset: 0.1, 0
    layers:
    - sprite: _DEN/Objects/Weapons/Guns/Projectiles/mantis.rsi
      state: muzzle_lethal
      map: ["enum.EffectLayers.Unshaded"]
      shader: unshaded
  - type: PointLight
    enabled: true
    radius: 2
    energy: 3
    color: "#44fbf7"

# Capgun bullets
- type: entity
  parent: BaseBullet
  id: BulletMantisCapgun
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _DEN/Objects/Weapons/Guns/Projectiles/mantis.rsi
    layers:
    - state: bullet_capgun
  - type: Ammo
    muzzleFlash: MuzzleFlashEffectMantisCapgun # Big fiery flash
  - type: Projectile
    impactEffect: BulletImpactEffectMantisCapgun # Silly little sparkle
    damage:
      types:
        Piercing: 0
    soundHit:
      path: /Audio/_DEN/Weapons/Guns/Hits/bwomp.ogg
      params:
        variation: 0.05

- type: entity
  parent: BulletMantisCapgun
  id: BulletMantisCapgunSpread
  categories: [ HideSpawnMenu ]
  components:
  - type: ProjectileSpread
    proto: BulletMantisCapgun
    count: 6
    spread: 20

# Pistol bullets, the rest are parented to these with damage/transfer amounts adjusted
# Initial piercing/holy damage values chosen by direction, may need work
- type: entity
  parent: BaseBullet
  id: BaseBulletMantis
  categories: [ HideSpawnMenu ]
  abstract: true
  components:
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.1,-0.1,0.1,0.1"
        hard: false
        mask:
        - Impassable
        - BulletImpassable
        - Opaque
      fly-by: &flybyfixture
        shape: !type:PhysShapeCircle
          radius: 1.5
        layer:
        - Impassable
        - MidImpassable
        - HighImpassable
        - LowImpassable
        - Opaque
        hard: False



- type: entity
  parent: BaseBulletMantis
  id: BulletMantisHoly
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _DEN/Objects/Weapons/Guns/Projectiles/mantis.rsi
    layers:
    - state: bullet_holy
      shader: unshaded
  - type: PointLight
    enabled: true
    radius: 1.75
    energy: 1.75
    color: "#88b0d0"
  - type: Ammo
    muzzleFlash: MuzzleFlashEffectMantisHoly
  - type: Projectile
    impactEffect: BulletImpactEffectMantisHoly
    damage:
      types:
        Holy: 10
    soundHit:
      path: /Audio/_DEN/Weapons/Guns/Hits/burnshot.ogg
      params:
        variation: 0.05

- type: entity
  parent: BaseBulletMantis
  id: BulletMantisLethal
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _DEN/Objects/Weapons/Guns/Projectiles/mantis.rsi
    layers:
    - state: bullet_lethal
      shader: unshaded
  - type: PointLight
    enabled: true
    radius: 1.75
    energy: 1.75
    color: "#44fbf7"
  - type: Ammo
    muzzleFlash: MuzzleFlashEffectMantisLethal
  - type: Projectile
    impactEffect: BulletImpactEffectMantisLethal
    damage:
      types:
        Piercing: 15
    soundHit:
      path: /Audio/Weapons/Guns/Hits/bullet_hit.ogg
      params:
        variation: 0.05

