- type: entity
  parent: [BaseAntiPsionicWeapon, BasePlushie, BaseKnife] # It has a tiny ritual knife...
  id: PlushieDollMantis
  name: sentimental mantis doll
  description: "A cute little doll with a mantis fez and a toy ritual knife. Wait--why is it sharp!?"
  components:
  - type: Sprite
    sprite: _DEN/Objects/Fun/toys.rsi
    state: doll_mantis
  - type: Item
    inhandVisuals:
      left:
      - state: doll_mantis-inhand-left
      right:
      - state: doll_mantis-inhand-right
  - type: FoodSequenceElement
    entries:
      CottonBurger: MantisDollPlushie
  - type: MeleeWeapon
    wideAnimationRotation: -150
  - type: ThrowingAngle
    angle: -150
  - type: DamageOtherOnHit
    damage:
      types:
        Slash: 1
        Holy: 2 # SLASH DASH. This is so stupid. Each hit is only 1 damage and there will never be this many entities together
  - type: EmbeddableProjectile
    embedOnThrow: false # She'll swipe through people instead of bounce off of them
  - type: StaticPrice
    price: 25
  - type: PhysicalComposition
    materialComposition:
      Mnemolith: 10
      Cloth: 10
  - type: Tag
    tags:
    - Payload
    - ClothMade
    - MantisBeltStorable
