- type: entity
  parent: [ClothingUniformJumpsuitMantis, BaseFoldable]
  id: ClothingUniformJumpsuitMantisDark
  name: dark mantis robe
  description: "A gloomy robe with flowing pants and an eye emblazoned on the back. The thigh windows can be folded shut, if you're feeling exposed."
  components:
  - type: Sprite
    sprite: _DEN/Clothing/Uniforms/Jumpsuit/mantis_dark.rsi
    layers:
    - state: icon
      map: ["unfoldedLayer"]
    - state: icon-folded
      map: ["foldedLayer"]
      visible: false
  - type: Clothing
    sprite: _DEN/Clothing/Uniforms/Jumpsuit/mantis_dark.rsi
  - type: Foldable
    canFoldInsideContainer: true
    foldVerbText: fold-verb
    unfoldVerbText: unfold-verb
  - type: FoldableClothing
    foldedEquippedPrefix: folded

- type: entity
  parent: [ClothingUniformJumpsuitMantis, BaseFoldable]
  id: ClothingUniformJumpsuitMantisLoincloth # This is ThatKidConnor's fault, but if you try to take it from me I'll kill us all.
  name: mantis loincloth
  description: "As if mantis uniforms weren't revealing enough. Still, there's something to be said for fighting otherworldly threats in only three strips of cloth. You can fold the top away if you really, truly feel the need."
  components:
  - type: Sprite
    sprite: _DEN/Clothing/Uniforms/Jumpsuit/mantis_loincloth.rsi
    layers:
    - state: icon
      map: ["unfoldedLayer"]
    - state: icon-folded
      map: ["foldedLayer"]
      visible: false
  - type: Clothing
    sprite: _DEN/Clothing/Uniforms/Jumpsuit/mantis_loincloth.rsi
  - type: Foldable
    canFoldInsideContainer: true
    foldVerbText: fold-verb
    unfoldVerbText: unfold-verb
  - type: FoldableClothing
    foldedEquippedPrefix: folded
