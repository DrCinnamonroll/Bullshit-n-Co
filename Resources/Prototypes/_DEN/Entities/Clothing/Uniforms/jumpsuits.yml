- type: entity
  parent: [ClothingUniformJumpsuitMantis, BaseFoldable]
  id: ClothingUniformJumpsuitMantisDark
  name: dark mantis robe
  description: "A gloomy robe with flowing pants and an eye emblazoned on the back. The thigh windows can be folded shut, if you're feeling exposed."
  components:
  - type: Sprite
    sprite: _DEN/Clothing/Uniforms/Jumpsuit/mantis_dark.rsi
    layers:
    - state: icon
      map: ["unfoldedLayer"]
    - state: icon-folded
      map: ["foldedLayer"]
      visible: false
  - type: Clothing
    sprite: _DEN/Clothing/Uniforms/Jumpsuit/mantis_dark.rsi
  - type: Foldable
    canFoldInsideContainer: true
    foldVerbText: fold-verb
    unfoldVerbText: unfold-verb
  - type: FoldableClothing
    foldedEquippedPrefix: folded
